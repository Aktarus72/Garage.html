<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Garage"/>
<meta name="theme-color" content="#000000"/>
<title>Garage</title>
<style>
:root{--bg:#f2f2f7;--bg2:#ffffff;--separator:rgba(60,60,67,.18);--label:#000000;--label2:rgba(60,60,67,.6);--label3:rgba(60,60,67,.3);--blue:#007aff;--red:#ff3b30;--green:#34c759;--orange:#ff9500;--fill:rgba(120,120,128,.2);--fill2:rgba(120,120,128,.16);--radius-lg:16px;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,34px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--label);min-height:100vh;overflow-x:hidden;font-size:17px}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.on{display:flex}
.navbar{background:rgba(242,242,247,.85);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--separator);padding:calc(var(--safe-top) + 4px) 16px 8px;position:sticky;top:0;z-index:100;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.navbar-large{background:rgba(242,242,247,.85);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--separator);padding:calc(var(--safe-top) + 4px) 16px 8px;position:sticky;top:0;z-index:100;flex-shrink:0}
.navbar-large-title{font-size:34px;font-weight:700;margin-top:8px}
.nav-btn{background:none;border:none;color:var(--blue);font-size:17px;cursor:pointer;padding:4px 0;font-family:inherit;font-weight:600}
.nav-icon-btn{background:var(--fill);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.nav-icon-btn.blue{background:var(--blue);color:#fff}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe-bot) + 80px)}
.vcard{margin-bottom:12px;background:var(--bg2);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.vcard-header{height:90px;display:flex;align-items:flex-end;padding:14px 16px 12px;position:relative}
.vcard-header-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.35))}
.vcard-title{color:#fff;font-size:20px;font-weight:700;position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.vcard-sub{color:rgba(255,255,255,.85);font-size:13px;position:relative;z-index:1;margin-top:2px}
.vcard-body{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.vcard-chip{background:var(--fill2);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--label);font-weight:500}
.vcard-urgent{background:rgba(255,59,48,.12);color:var(--red);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:600}
.segment{background:rgba(120,120,128,.12);border-radius:9px;padding:2px;display:flex;margin:12px 16px;flex-shrink:0}
.seg-btn{flex:1;border:none;background:none;border-radius:7px;padding:6px 0;font-size:13px;font-weight:600;color:var(--label2);cursor:pointer;font-family:inherit}
.seg-btn.on{background:#fff;color:var(--label);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.scard{margin:0 16px 12px;background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;display:flex;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.scard-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.scard-body{flex:1}
.scard-title{font-size:17px;font-weight:600}
.scard-sub{font-size:13px;color:var(--label2);margin-top:2px}
.scard-right{text-align:right;flex-shrink:0}
.scard-days{font-size:15px;font-weight:700;margin-bottom:6px}
.scard-actions{display:flex;gap:6px}
.mcard{margin:0 16px 12px;background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mcard-title{font-size:17px;font-weight:600}
.mcard-sub{font-size:13px;color:var(--label2);margin-top:3px}
.mcard-costo{display:inline-block;background:rgba(52,199,89,.12);color:var(--green);border-radius:8px;padding:3px 10px;font-size:13px;font-weight:600;margin-top:8px}
.mcard-note{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:14px;margin-top:10px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.mcard-files{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.file-badge{background:rgba(0,122,255,.12);color:var(--blue);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600}
.icon-action{background:var(--fill2);border:none;border-radius:8px;padding:6px 10px;font-size:14px;cursor:pointer;color:var(--label);font-family:inherit}
.icon-action.red{background:rgba(255,59,48,.1);color:var(--red)}
.fab{position:fixed;bottom:calc(var(--safe-bot) + 16px);right:20px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,122,255,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.add-row{display:flex;align-items:center;padding:12px 16px;gap:12px;background:var(--bg2);border-radius:var(--radius-lg);margin:12px 16px 0;cursor:pointer}
.add-row:active{opacity:.6}
.add-row-icon{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.add-row-label{color:var(--blue);font-size:17px}
.form-section{margin:28px 16px 0}
.form-section-label{font-size:13px;color:var(--label2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding-left:4px}
.form-group{background:var(--bg2);border-radius:var(--radius-lg);overflow:hidden}
.form-row{display:flex;align-items:center;padding:0 16px;min-height:44px;position:relative;cursor:pointer}
.form-row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:16px;right:0;height:.5px;background:var(--separator)}
.form-label{font-size:17px;color:var(--label);width:110px;flex-shrink:0}
.form-input{flex:1;border:none;background:none;font-size:17px;color:var(--label);padding:12px 0;outline:none;font-family:inherit;text-align:right;min-width:0}
.form-input::placeholder{color:var(--label3)}
.form-input.left{text-align:left}
select.form-input{-webkit-appearance:none;cursor:pointer}
.form-textarea-wrap{padding:12px 16px}
.form-textarea{width:100%;border:none;background:none;font-size:17px;color:var(--label);outline:none;font-family:inherit;resize:none;line-height:1.5;min-height:100px}
.form-textarea::placeholder{color:var(--label3)}
.color-preview{width:28px;height:28px;border-radius:50%;border:2px solid var(--separator);cursor:pointer;flex-shrink:0}
input[type=color]{opacity:0;position:absolute;width:0;height:0}
input[type=file]{opacity:0;position:absolute;width:0;height:0}
.file-upload-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:12px}
.file-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.empty{text-align:center;padding:60px 24px;color:var(--label2);font-size:15px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--label);margin-bottom:6px}
.toast{position:fixed;top:calc(var(--safe-top) + 54px);left:50%;transform:translateX(-50%);background:rgba(50,50,50,.92);color:#fff;border-radius:14px;padding:10px 20px;font-size:15px;font-weight:500;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:opacity .3s}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:200}
.action-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:8px 16px calc(var(--safe-bot) + 8px);animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-msg{text-align:center;font-size:15px;color:var(--label);padding:0 0 16px}
.sheet-btn{width:100%;padding:16px;border:none;border-radius:var(--radius-lg);font-size:17px;cursor:pointer;font-family:inherit;margin-bottom:8px;background:var(--bg2);color:var(--label);font-weight:400}
.sheet-btn.red{color:var(--red);font-weight:600}
.sheet-btn.cancel{color:var(--blue);font-weight:600;margin-top:4px}
.det-hero{height:160px;position:relative;flex-shrink:0}
.det-hero-bg{position:absolute;inset:0}
.det-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.5))}
.det-hero-content{position:absolute;bottom:0;left:0;right:0;padding:16px}
.det-hero-title{color:#fff;font-size:28px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.det-hero-sub{color:rgba(255,255,255,.85);font-size:14px;margin-top:2px}
.det-hero-chips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.det-hero-chip{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;color:#fff;font-weight:500}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--fill);border-top:3px solid var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cost-section{background:var(--bg2);border-radius:var(--radius-lg);margin:12px 16px 0;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.cost-row:not(:last-child){border-bottom:0.5px solid var(--separator)}
.cost-label{font-size:15px;color:var(--label)}
.cost-value{font-size:15px;font-weight:700;color:var(--green)}
.notification-popup{position:fixed;top:calc(var(--safe-top) + 20px);left:50%;transform:translateX(-50%);background:var(--red);color:#fff;border-radius:14px;padding:14px 20px;font-size:15px;font-weight:600;z-index:1000;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(255,59,48,.3);animation:popdown .3s ease}
@keyframes popdown{from{transform:translateX(-50%) translateY(-100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<div id="s-splash" class="screen on">
 <div class="loading">
   <div style="font-size:56px">🏎️</div>
   <div style="font-size:28px;font-weight:700">Garage</div>
   <div class="spinner"></div>
 </div>
</div>

<div id="s-garage" class="screen">
 <div class="navbar-large">
   <div style="display:flex;justify-content:space-between;align-items:center;height:44px">
     <div class="navbar-large-title">Garage</div>
     <button class="nav-icon-btn blue" onclick="apriFormVeicolo(null)">＋</button>
   </div>
 </div>
 <div class="scroll" id="garage-list" style="padding-top:8px"></div>
</div>

<div id="s-det" class="screen">
 <div class="navbar">
   <button class="nav-btn" onclick="go('garage')">‹ Garage</button>
   <div style="display:flex;gap:8px;flex-shrink:0">
     <button class="nav-icon-btn" onclick="apriFormVeicolo(curId)">✏️</button>
     <button class="nav-icon-btn" onclick="mostraSheet('veicolo',curId)">🗑️</button>
   </div>
 </div>
 <div class="scroll" style="padding-top:0;padding-bottom:80px">
   <div class="det-hero" id="det-hero">
     <div class="det-hero-bg" id="det-hero-bg"></div>
     <div class="det-hero-overlay"></div>
     <div class="det-hero-content">
       <div class="det-hero-title" id="det-nome"></div>

 <div class="navbar">
   <button class="nav-btn" id="fv-cancel">Annulla</button>

 </div>
 <div class="scroll">
   <div class="form-section" style="margin-top:16px">
     <div class="form-group">
       <div class="form-row"><span class="form-label">Nome</span><input class="form-input" id="fv-nome" placeholder="Golf Blu"/></div>
       <div class="form-row"><span class="form-label">Marca</span><input class="form-input" id="fv-marca" placeholder="Volkswagen"/></div>
       <div class="form-row"><span class="form-label">Modello</span><input class="form-input" id="fv-modello" placeholder="Golf 7"/></div>
       <div class="form-row"><span class="form-label">Anno</span><input class="form-input" id="fv-anno" type="number" placeholder="2020"/></div>
       <div class="form-row"><span class="form-label">Targa</span><input class="form-input" id="fv-targa" placeholder="AB123CD" style="text-transform:uppercase"/></div>

   <div class="form-section">
     <div class="form-group">
       <div class="form-row"><span class="form-label">Carburante</span><select class="form-input" id="fv-carb"><option>Benzina</option><option>Diesel</option><option>GPL</option><option>Metano</option><option>Ibrido</option><option>Elettrico</option></select></div>
       <div class="form-row"><span class="form-label">KM</span><input class="form-input" id="fv-km" type="number" placeholder="0"/></div>

   <button class="nav-btn" onclick="go('det')">Annulla</button>

       <div class="form-row"><span class="form-label">Data</span><input class="form-input" id="fm-data" type="date"/></div>

   <div class="form-section">

     <div class="form-group">

 </div>

<div id="toast" class="toast" style="display:none"></div>
<div id="notification-popup" style="display:none"></div>

<script>
const FB_URL='https://garage-app-3cef3-default-rtdb.europe-west1.firebasedatabase.app/garage.json';

let veicoli=[],scadenze=[],manutenzioni=[];
let curId=null,curTab='sca',editId=null;
let fbReady=false;
let notificationShown=false;
let currentFiles=[];

async function caricaDaFirebase(){
 try{
   const r=await fetch(FB_URL);
   if(r.ok){
     const d=await r.json();
     if(d){veicoli=d.veicoli||[];scadenze=d.scadenze||[];manutenzioni=d.manutenzioni||[];}
   }
 }catch(e){console.log('Firebase non disponibile');}
 fbReady=true;
 mostraNotifiche();
 go('garage');
}

async function salvaFirebase(){
 if(!fbReady)return;
 try{
   await fetch(FB_URL,{method:'PUT',body:JSON.stringify({veicoli,scadenze,manutenzioni})});
 }catch(e){console.log('Errore salvataggio');}
}

function mostraNotifiche(){
 const urgenti=scadenze.filter(s=>{const g=giorni(s.data);return g!==null&&g<=30&&g>=0;});
 if(urgenti.length>0&&!notificationShown){
   notificationShown=true;
   const msg=urgenti.length===1?`⚠️ ${urgenti[0].tipo} scade tra ${giorni(urgenti[0].data)} giorni`:`⚠️ Hai ${urgenti.length} scadenze urgenti`;
   const popup=document.getElementById('notification-popup');
   popup.textContent=msg;
   popup.style.display='block';
   setTimeout(()=>{popup.style.display='none';notificationShown=false;},5000);
 }
}

function handleFileSelect(e){
 const files=e.target.files;
 currentFiles=[];
 const list=document.getElementById('fm-file-list');
 list.innerHTML='';
 for(let i=0;i<files.length;i++){
   const f=files[i];
   const reader=new FileReader();
   reader.onload=ev=>{
     currentFiles.push({name:f.name,data:ev.target.result});
     const badge=document.createElement('div');
     badge.className='file-badge';
     badge.textContent='📎 '+f.name;
     list.appendChild(badge);
   };
   reader.readAsDataURL(f);
 }
}

function uid(){return Math.random().toString(36).slice(2,10);}
function fmt(d){if(!d)return'–';const[y,m,g]=d.split('-');return`${g}/${m}/${y}`;}
function oggi(){return new Date(new Date().toDateString());}
function giorni(d){if(!d)return null;return Math.round((new Date(d)-oggi())/86400000);}
function stato(g){
 if(g===null)return{col:'#8e8e93',bg:'rgba(142,142,147,.12)',lb:'–',dot:'#8e8e93'};
 if(g<0)  return{col:'#ff3b30',bg:'rgba(255,59,48,.08)',  lb:'Scaduta',dot:'#ff3b30'};
 if(g<=30)return{col:'#ff9500',bg:'rgba(255,149,0,.08)',  lb:g+'g',   dot:'#ff9500'};
 if(g<=90)return{col:'#ffcc00',bg:'rgba(255,204,0,.1)',   lb:g+'g',   dot:'#ffcc00'};
 return       {col:'#34c759',bg:'rgba(52,199,89,.08)',   lb:g+'g',   dot:'#34c759'};
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function nl(n){return Number(n||0).toLocaleString('it');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.style.display='none',300);},2200);}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById('s-'+id).classList.add('on');window.scrollTo(0,0);if(id==='garage'){renderGarage();mostraNotifiche();}if(id==='det')renderDet();}

function renderGarage(){
 const urg={};
 const totali={};
 scadenze.forEach(s=>{const g=giorni(s.data);if(g!==null&&g<=30)urg[s.vid]=(urg[s.vid]||0)+1;});
 manutenzioni.forEach(m=>{totali[m.vid]=(totali[m.vid]||0)+(m.costo||0);});
 const el=document.getElementById('garage-list');
 if(!veicoli.length){el.innerHTML=`<div class="empty" style="margin-top:40px"><div class="empty-icon">🚗</div><div class="empty-title">Nessun veicolo</div><div>Tocca ＋ per aggiungerne uno</div></div>`;return;}
 el.innerHTML=veicoli.map(v=>{const u=urg[v.id]||0;const tot=totali[v.id]||0;return`<div class="vcard" onclick="apriDet('${v.id}')"><div class="vcard-header" style="background:${esc(v.colore||'#007aff')}"><div class="vcard-header-overlay"></div><div style="position:relative;z-index:1"><div class="vcard-title">${esc(v.nome)}</div><div class="vcard-sub">${esc(v.marca)} ${esc(v.modello)} · ${esc(String(v.anno))}</div></div></div><div class="vcard-body"><span class="vcard-chip">🏷️ ${esc(v.targa)}</span><span class="vcard-chip">⛽ ${esc(v.carb)}</span><span class="vcard-chip">📍 ${nl(v.km)} km</span>${tot>0?`<span class="vcard-chip">💶 € ${nl(tot)}</span>`:''}${u>0?`<span class="vcard-urgent">⚠️ ${u} scad.</span>`:''}</div></div>`;}).join('');
}

function apriDet(id){curId=id;curTab='sca';go('det');}
function renderDet(){
 const v=veicoli.find(x=>x.id===curId);if(!v){go('garage');return;}
 document.getElementById('det-hero-bg').style.background=v.colore||'#007aff';
 document.getElementById('det-nome').textContent=v.nome;
 document.getElementById('det-sub').textContent=`${v.marca} ${v.modello} · ${v.anno} · ${v.targa}`;
 document.getElementById('det-chips').innerHTML=`<span class="det-hero-chip">📍 ${nl(v.km)} km</span><span class="det-hero-chip">⛽ ${esc(v.carb)}</span>${v.note?`<span class="det-hero-chip">📝 ${esc(v.note)}</span>`:''}`;
 document.getElementById('tab-sca').className='seg-btn'+(curTab==='sca'?' on':'');
 document.getElementById('tab-man').className='seg-btn'+(curTab==='man'?' on':'');
 curTab==='sca'?renderScadenze():renderManutenzioni();
}
function switchTab(t){curTab=t;renderDet();}

function renderScadenze(){
 const mie=scadenze.filter(s=>s.vid===curId).sort((a,b)=>(giorni(a.data)??999)-(giorni(b.data)??999));
 let html='';
 if(!mie.length)html=`<div class="empty" style="margin-top:40px"><div class="empty-icon">📅</div><div class="empty-title">Nessuna scadenza</div></div>`;
 html+=mie.map(s=>{const st=stato(giorni(s.data));return`<div class="scard" style="background:${st.bg}"><div class="scard-dot" style="background:${st.dot}"></div><div class="scard-body"><div class="scard-title">${esc(s.tipo)}</div><div class="scard-sub">Scade il ${fmt(s.data)}</div>${s.note?`<div class="scard-sub" style="margin-top:4px;color:#475569">${esc(s.note)}</div>`:''}</div><div class="scard-right"><div class="scard-days" style="color:${st.col}">${st.lb}</div><div class="scard-actions"><button class="icon-action" onclick="apriFormSca('${s.id}')">✏️</button><button class="icon-action red" onclick="mostraSheet('sca','${s.id}')">🗑️</button></div></div></div>`;}).join('');
 html+=`<div class="add-row" onclick="apriFormSca(null)"><div class="add-row-icon">＋</div><div class="add-row-label">Aggiungi scadenza</div></div>`;
 document.getElementById('det-content').innerHTML=html;
}

function renderManutenzioni(){
 const mie=manutenzioni.filter(m=>m.vid===curId).sort((a,b)=>b.data.localeCompare(a.data));
 const totale=mie.reduce((sum,m)=>sum+(m.costo||0),0);
 let html='';
 if(!mie.length)html=`<div class="empty" style="margin-top:40px"><div class="empty-icon">🔧</div><div class="empty-title">Nessun intervento</div></div>`;
 else{
   html+=`<div class="cost-section"><div class="cost-row"><span class="cost-label">Totale costi</span><span class="cost-value">€ ${nl(totale)}</span></div></div>`;
 }
 html+=mie.map(m=>`<div class="mcard"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div><div class="mcard-title">${esc(m.tipo)}</div><div class="mcard-sub">${fmt(m.data)} · ${nl(m.km)} km${m.officina?' · '+esc(m.officina):''}</div>${m.costo>0?`<div class="mcard-costo">💶 € ${nl(m.costo)}</div>`:''}</div><div style="display:flex;gap:6px"><button class="icon-action" onclick="apriFormMan('${m.id}')">✏️</button><button class="icon-action red" onclick="mostraSheet('man','${m.id}')">🗑️</button></div></div>${m.note?`<div class="mcard-note">${esc(m.note)}</div>`:''}<div class="mcard-files">${m.files&&m.files.length>0?m.files.map(f=>`<div class="file-badge">📎 ${esc(f.name)}</div>`).join(''):''}${m.files&&m.files.length>0?'':''}</div></div>`).join('');
 html+=`<div class="add-row" onclick="apriFormMan(null)"><div class="add-row-icon">＋</div><div class="add-row-label">Registra intervento</div></div>`;
 document.getElementById('det-content').innerHTML=html;
}

function apriFormVeicolo(id){
 editId=id;
 const v=id?veicoli.find(x=>x.id===id):null;
 document.getElementById('fv-cancel').onclick=()=>v?go('det'):go('garage');
 document.getElementById('fv-nome').value=v?.nome||'';
 document.getElementById('fv-marca').value=v?.marca||'';
 document.getElementById('fv-modello').value=v?.modello||'';
 document.getElementById('fv-anno').value=v?.anno||'';
 document.getElementById('fv-targa').value=v?.targa||'';
 document.getElementById('fv-carb').value=v?.carb||'Benzina';
 document.getElementById('fv-km').value=v?.km||'';
 const col=v?.colore||'#007aff';
 document.getElementById('fv-colore-inp').value=col;
 document.getElementById('fv-colore-prev').style.background=col;
 document.getElementById('fv-note').value=v?.note||'';
 go('fv');
}
function aggiornaColore(val){document.getElementById('fv-colore-prev').style.background=val;}
function salvaVeicolo(){
 const nome=document.getElementById('fv-nome').value.trim();
 const marca=document.getElementById('fv-marca').value.trim();
 const modello=document.getElementById('fv-modello').value.trim();
 const targa=document.getElementById('fv-targa').value.trim().toUpperCase();
 if(!nome||!marca||!modello||!targa){toast('⚠️ Compila campi obbligatori');return;}
 const d={nome,marca,modello,targa,anno:Number(document.getElementById('fv-anno').value)||'',carb:document.getElementById('fv-carb').value,km:Number(document.getElementById('fv-km').value)||0,colore:document.getElementById('fv-colore-inp').value,note:document.getElementById('fv-note').value.trim()};
 if(editId){veicoli=veicoli.map(v=>v.id===editId?{...v,...d}:v);toast('Aggiornato');}
 else{const nv={id:uid(),...d};veicoli=[...veicoli,nv];curId=nv.id;toast('Aggiunto');}
 salvaFirebase();go('det');
}

function apriFormMan(id){
 editId=id;
 const m=id?manutenzioni.find(x=>x.id===id):null;
 currentFiles=m?.files||[];
 document.getElementById('fm-data').value=m?.data||new Date().toISOString().split('T')[0];
 document.getElementById('fm-tipo').value=m?.tipo||'Tagliando';
 document.getElementById('fm-km').value=m?.km||'';
 document.getElementById('fm-officina').value=m?.officina||'';
 document.getElementById('fm-costo').value=m?.costo||'';
 document.getElementById('fm-note').value=m?.note||'';
 const fileList=document.getElementById('fm-file-list');
 fileList.innerHTML='';
 if(currentFiles.length>0){
   currentFiles.forEach(f=>{
     const badge=document.createElement('div');
     badge.className='file-badge';
     badge.textContent='📎 '+f.name;
     fileList.appendChild(badge);
   });
 }
 go('fm');
}
function salvaManutenzione(){
 const data=document.getElementById('fm-data').value;
 if(!data){toast('⚠️ Inserisci data');return;}
 const d={data,tipo:document.getElementById('fm-tipo').value,km:Number(document.getElementById('fm-km').value)||0,officina:document.getElementById('fm-officina').value.trim(),costo:Number(document.getElementById('fm-costo').value)||0,note:document.getElementById('fm-note').value.trim(),files:currentFiles};
 if(editId){manutenzioni=manutenzioni.map(m=>m.id===editId?{...m,...d}:m);toast('Aggiornato');}
 else{manutenzioni=[...manutenzioni,{id:uid(),vid:curId,...d}];toast('Salvato');}
 currentFiles=[];
 salvaFirebase();go('det');
}

function apriFormSca(id){
 editId=id;
 const s=id?scadenze.find(x=>x.id===id):null;
 document.getElementById('fs-tipo').value=s?.tipo||'Bollo';
 document.getElementById('fs-data').value=s?.data||'';
 document.getElementById('fs-note').value=s?.note||'';
 go('fs');
}
function salvaScadenza(){
 const data=document.getElementById('fs-data').value;
 if(!data){toast('⚠️ Inserisci data');return;}
 const d={tipo:document.getElementById('fs-tipo').value,data,note:document.getElementById('fs-note').value.trim()};
 if(editId){scadenze=scadenze.map(s=>s.id===editId?{...s,...d}:s);toast('Aggiornato');}
 else{scadenze=[...scadenze,{id:uid(),vid:curId,...d}];toast('Aggiunto');}
 salvaFirebase();go('det');
}

function mostraSheet(tipo,id){
 const msgs={veicolo:`Eliminare "${veicoli.find(v=>v.id===id)?.nome}"?`,sca:'Eliminare scadenza?',man:'Eliminare intervento?'};
 document.getElementById('sheet-msg').textContent=msgs[tipo];
 document.getElementById('sheet-ok').onclick=()=>{esegui(tipo,id);chiudiSheet();};
 document.getElementById('overlay').style.display='flex';
}
function chiudiSheet(){document.getElementById('overlay').style.display='none';}
function esegui(tipo,id){
 if(tipo==='veicolo'){veicoli=veicoli.filter(v=>v.id!==id);scadenze=scadenze.filter(s=>s.vid!==id);manutenzioni=manutenzioni.filter(m=>m.vid!==id);salvaFirebase();toast('Eliminato');go('garage');}
 else if(tipo==='sca'){scadenze=scadenze.filter(s=>s.id!==id);salvaFirebase();toast('Eliminato');renderDet();}
 else if(tipo==='man'){manutenzioni=manutenzioni.filter(m=>m.id!==id);salvaFirebase();toast('Eliminato');renderDet();}
}

caricaDaFirebase();
</script>
</body>
</html>
